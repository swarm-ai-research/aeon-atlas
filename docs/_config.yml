title: "Aeon Atlas"
description: "A live map of the aeon fork ecosystem — every public fork, what they enable, where they cluster. Regenerated weekly."
baseurl: "/aeon-atlas"
url: "https://swarm-ai-research.github.io"

# Build settings
theme: minima
markdown: kramdown

# Author
author:
  name: Aeon Atlas
  url: https://github.com/swarm-ai-research/aeon-atlas

# Navigation — atlas-focused. Inherited upstream pages remain accessible
# at their direct URLs but aren't surfaced in the header.
header_pages:
  - index.md
  - atlas.md
  - innovations.md
  - disabled-defaults.md
  - ecosystem.md
  - skill-packs.md

# Permalinks
permalink: /articles/:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - "*.sh"
  # NB: `universe/` is intentionally NOT excluded. Jekyll's `exclude`
  # removes paths from the published output entirely (not just from
  # Jekyll-processing), which 404'd the Quartz site. Jekyll passes through
  # .html files without YAML frontmatter unchanged, so the Quartz output
  # coexists safely without an exclude entry.
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# Social links
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/swarm-ai-research/aeon-atlas" }
